name: 基础检查

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python 语法检查
        run: |
          python -m compileall apps tools

      - name: 构建脚本帮助检查
        run: |
          python tools/universal_builder.py --help
          python tools/project_data_builder.py --help

      - name: 本地聊天应用导入检查
        run: |
          python - <<'PY'
          from apps.local_chat.app import app
          from apps.local_chat.config import settings
          from apps.local_chat.services.profile_loader import load_profile

          profile = load_profile(settings.repo_root, settings.exes_dir, settings.default_slug)
          assert app.title
          assert profile["slug"]
          print("应用与示例资料包检查通过")
          PY
